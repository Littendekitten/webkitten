<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Webkitten | Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #ff6700; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #ff6700; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 10px; }
        .btn-google { background: #4285F4; color: white; }
        .btn-update { background: #31b057; color: white; }
        #adminTools { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Admin Panel 🐾</h1>
        
        <div id="loginSection">
            <p>Only Sven can enter here.</p>
            <button class="btn-google" onclick="login()">Login with Google</button>
        </div>

        <div id="adminTools">
            <p>Hi Sven! Manage your Tikkie link below.</p>
            <input type="text" id="newLink" placeholder="Paste new Tikkie Link">
            <label style="display:block; text-align:left; font-size:0.8rem; font-weight:bold;">EXPIRY DATE:</label>
            <input type="date" id="expiryDate">
            <button class="btn-update" onclick="updateDatabase()">Save Changes</button>
            <p id="msg" style="margin-top:15px; font-weight:bold;"></p>
            <button style="background:none; color:#888; font-size:0.8rem;" onclick="firebase.auth().signOut()">Logout</button>
        </div>
    </div>

    <script>
        // USE THE SAME CONFIG AS ABOVE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", 
            authDomain: "webkitten-buysite.firebaseapp.com",
            databaseURL: "https://webkitten-buysite-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "webkitten-buysite",
            storageBucket: "webkitten-buysite.appspot.com",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).catch(e => alert(e.message));
        }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                if (user.email === "littendekitten@gmail.com") {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('adminTools').style.display = 'block';
                } else {
                    alert("Unauthorized! You are not Sven.");
                    firebase.auth().signOut();
                }
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('adminTools').style.display = 'none';
            }
        });

        function updateDatabase() {
            const link = document.getElementById('newLink').value;
            const expiry = document.getElementById('expiryDate').value;
            const msg = document.getElementById('msg');

            if (!link || !expiry) return alert("Please fill in both fields.");

            firebase.database().ref('settings').set({ link, expiry })
                .then(() => {
                    msg.style.color = "green";
                    msg.innerText = "Successfully updated!";
                })
                .catch(e => {
                    msg.style.color = "red";
                    msg.innerText = "Error: " + e.message;
                });
        }
    </script>
</body>
</html>
