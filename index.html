<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webkitten | Order Your Website</title>
    <style>
        :root {
            --primary-orange: #ff6700;
            --dark-orange: #e65c00;
            --light-orange: #fff3e6;
            --white: #ffffff;
            --text-dark: #2d2d2d;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light-orange);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            background-color: var(--white);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 103, 0, 0.15);
            max-width: 500px;
            width: 95%;
            border-top: 8px solid var(--primary-orange);
        }

        h1 {
            color: var(--primary-orange);
            font-size: 2.8rem;
            margin: 0 0 10px 0;
        }

        p {
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Calculator styling */
        .calculator {
            background: #fdf2e9;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        input[type="number"] {
            width: 80px;
            padding: 10px;
            font-size: 1.2rem;
            border: 2px solid var(--primary-orange);
            border-radius: 10px;
            text-align: center;
            outline: none;
        }

        .price-display {
            font-size: 2rem;
            font-weight: 800;
            color: var(--dark-orange);
            margin-top: 15px;
            display: block;
        }

        .cta-button {
            background-color: var(--primary-orange);
            color: var(--white);
            text-decoration: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 6px 15px rgba(255, 103, 0, 0.3);
            width: 80%;
        }

        .cta-button:hover {
            background-color: var(--dark-orange);
            transform: translateY(-3px);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #888;
        }

        .paw { color: var(--primary-orange); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Webkitten <span class="paw">🐾</span></h1>
        <p>Affordable websites for your hobby or project. <br>Simple, fast, and orange!</p>
        
        <div class="calculator">
            <label for="pages">How many pages do you need?</label>
            <input type="number" id="pages" value="1" min="1" oninput="calculatePrice()">
            
            <span class="price-display" id="totalPrice">Total: €2</span>
        </div>

        <a href="#" id="mailButton" class="cta-button">
            Request Website
        </a>
    </div>

    <div class="footer">
        &copy; 2026 Webkitten. All rights reserved.
    </div>

    <script>
        function calculatePrice() {
            const pagesInput = document.getElementById('pages');
            const priceDisplay = document.getElementById('totalPrice');
            const mailButton = document.getElementById('mailButton');
            
            let pages = pagesInput.value;
            if (pages < 1) pages = 1; // Voorkom 0 of negatieve pagina's
            
            const total = pages * 2;
            
            // Update de tekst op de website
            priceDisplay.innerText = "Total: €" + total;
            
            // Update de e-mail link automatisch
            const email = "littendekitten@gmail.com";
            const subject = encodeURIComponent("I want a Webkitten website");
            const body = encodeURIComponent(
                "Hi Webkitten!\n\n" +
                "I would like to order a website with " + pages + " page(s).\n" +
                "The estimated total price is €" + total + ".\n\n" +
                "My idea for the site is:\n[Describe your site here]"
            );
            
            mailButton.href = "mailto:" + email + "?subject=" + subject + "&body=" + body;
        }

        // Voer de functie 1 keer uit bij het laden zodat de knop direct werkt
        calculatePrice();
    </script>

</body>
</html>
