<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webkitten | €1 Per Page</title>
    <style>
        /* --- ORANGE THEME --- */
        :root {
            --primary-orange: #ff6700;
            --dark-orange: #e65c00;
            --soft-orange: #fff3e6;
            --white: #ffffff;
            --text: #2d2d2d;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--soft-orange);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            background-color: var(--white);
            padding: 50px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 103, 0, 0.1);
            max-width: 450px;
            width: 100%;
            border-top: 10px solid var(--primary-orange);
        }

        h1 {
            color: var(--primary-orange);
            font-size: 3rem;
            margin: 0 0 10px 0;
            font-weight: 900;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #555;
        }

        /* --- CALCULATOR SECTION --- */
        .calculator {
            background: #fffbf5;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #ffe0b2;
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="number"] {
            width: 100px;
            padding: 12px;
            font-size: 1.5rem;
            border: 3px solid var(--primary-orange);
            border-radius: 15px;
            text-align: center;
            outline: none;
            color: var(--dark-orange);
            font-weight: bold;
        }

        .total-price {
            display: block;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--dark-orange);
            margin-top: 20px;
        }

        /* --- BUTTON --- */
        .cta-button {
            background-color: var(--primary-orange);
            color: var(--white);
            text-decoration: none;
            padding: 20px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 8px 20px rgba(255, 103, 0, 0.3);
            width: 85%;
        }

        .cta-button:hover {
            background-color: var(--dark-orange);
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(255, 103, 0, 0.4);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #999;
            letter-spacing: 0.5px;
        }

        .paw-icon {
            color: var(--primary-orange);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Webkitten <span class="paw-icon">🐾</span></h1>
        <p class="subtitle">Get your dream website for only €1 per page!</p>
        
        <div class="calculator">
            <label for="pageInput">Number of pages:</label>
            <input type="number" id="pageInput" value="1" min="1" oninput="updatePrice()">
            
            <div class="total-price" id="displayPrice">Total: €1</div>
        </div>

        <a href="#" id="orderBtn" class="cta-button">
            Order Now
        </a>
    </div>

    <div class="footer">
        &copy; 2026 Webkitten. All rights reserved.
    </div>

    <script>
        function updatePrice() {
            const input = document.getElementById('pageInput');
            const display = document.getElementById('displayPrice');
            const btn = document.getElementById('orderBtn');
            
            let val = input.value;
            
            // Zorg dat het getal niet onder de 1 komt
            if (val < 1 && val !== "") {
                val = 1;
                input.value = 1;
            }

            // Berekening: 1 euro per pagina
            const total = val * 1;
            
            // Update display
            display.innerText = "Total: €" + (val === "" ? "0" : total);
            
            // Update Mail Link
            const email = "littendekitten@gmail.com";
            const subject = encodeURIComponent("Webkitten Order: " + val + " page(s)");
            const body = encodeURIComponent(
                "Hello Webkitten!\n\n" +
                "I would like to order a website with " + val + " page(s).\n" +
                "The total price is €" + total + ".\n\n" +
                "Here is my idea for the website:\n[Type your ideas here]"
            );
            
            btn.href = "mailto:" + email + "?subject=" + subject + "&body=" + body;
        }

        // Run direct om de knop te activeren bij het laden
        updatePrice();
    </script>

</body>
</html>
