<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webkitten | €2 Per Page</title>
    <style>
        :root {
            --primary-orange: #ff6700;
            --dark-orange: #e65c00;
            --soft-orange: #fff3e6;
            --white: #ffffff;
            --text: #2d2d2d;
            --gray: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--soft-orange);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            background-color: var(--white);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 103, 0, 0.1);
            max-width: 450px;
            width: 100%;
            border-top: 10px solid var(--primary-orange);
        }

        h1 {
            color: var(--primary-orange);
            font-size: 3rem;
            margin: 0 0 10px 0;
            font-weight: 900;
        }

        .subtitle {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #555;
        }

        .calculator {
            background: #fffbf5;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #ffe0b2;
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--dark-orange);
        }

        input[type="number"] {
            width: 80px;
            padding: 10px;
            font-size: 1.2rem;
            border: 2px solid var(--primary-orange);
            border-radius: 12px;
            text-align: center;
            outline: none;
            font-weight: bold;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 12px;
            border: 2px solid var(--primary-orange);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        .max-note {
            font-size: 0.8rem;
            color: #cc5200;
            font-weight: 600;
            margin-left: 10px;
        }

        .total-price {
            display: block;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--dark-orange);
            margin-top: 15px;
            text-align: center;
        }

        .cta-button {
            background-color: var(--primary-orange);
            color: var(--white);
            text-decoration: none;
            padding: 16px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 8px 20px rgba(255, 103, 0, 0.2);
            width: 85%;
            margin-top: 10px;
        }

        .cta-button.disabled {
            background-color: var(--gray);
            box-shadow: none;
            opacity: 0.6;
            pointer-events: none;
        }

        .cta-button:not(.disabled):hover {
            background-color: var(--dark-orange);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 103, 0, 0.3);
        }

        .stripe-btn {
            background-color: #635bff; /* Stripe Paars */
            margin-top: 15px;
        }

        .stripe-btn:not(.disabled):hover {
            background-color: #4338ca;
            box-shadow: 0 12px 25px rgba(99, 91, 255, 0.3);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #999;
        }

        .paw-icon { color: var(--primary-orange); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Webkitten <span class="paw-icon">🐾</span></h1>
        <p class="subtitle">Custom websites for just <strong>€2 per page</strong>.</p>
        
        <div class="calculator">
            <label for="pageInput">1. How many pages?</label>
            <input type="number" id="pageInput" value="1" min="1" max="10" 
                   onkeydown="return ['e', 'E', '+', '-', '.', ','].includes(event.key) ? false : true"
                   oninput="updatePrice()">
            <span class="max-note">(Max 10)</span>

            <label for="projectDescription">2. Describe your project:</label>
            <textarea id="projectDescription" placeholder="What is your website about?" oninput="updatePrice()"></textarea>
            
            <div class="total-price" id="displayPrice">Total: €2</div>
        </div>

        <a href="#" id="orderBtn" class="cta-button disabled">
            Send Project Details
        </a>

        <a href="#" id="stripeBtn" target="_blank" class="cta-button stripe-btn disabled">
            Pay with Stripe
        </a>
    </div>

    <div class="footer">
        &copy; 2026 Webkitten. All rights reserved.
    </div>

    <script>
        function updatePrice() {
            const pageInput = document.getElementById('pageInput');
            const descInput = document.getElementById('projectDescription');
            const display = document.getElementById('displayPrice');
            const orderBtn = document.getElementById('orderBtn');
            const stripeBtn = document.getElementById('stripeBtn');
            
            let pages = pageInput.value;
            let description = descInput.value;
            
            if (pages > 10) { pages = 10; pageInput.value = 10; }
            if (pages < 1 && pages !== "") { pages = 1; pageInput.value = 1; }

            const total = pages * 2;
            display.innerText = "Total: €" + (pages === "" ? "0" : total);
            
            // VERGEET HIERONDER NIET JE EIGEN STRIPE LINK TE PLAKKEN!
            const stripeLink = "HIER_JOUW_STRIPE_LINK";
            
            if (description.trim().length > 5) {
                orderBtn.classList.remove('disabled');
                stripeBtn.classList.remove('disabled');
                
                // Mail setup
                const email = "littendekitten@gmail.com";
                const subject = encodeURIComponent("Webkitten Order: " + pages + " page(s)");
                const body = encodeURIComponent(
                    "Hello Webkitten!\n\n" +
                    "I want to order " + pages + " page(s).\n" +
                    "Total price: €" + total + ".\n\n" +
                    "Project Idea:\n" + description + "\n\n" +
                    "[I will now click the Stripe button to pay!]"
                );
                orderBtn.href = "mailto:" + email + "?subject=" + subject + "&body=" + body;
                
                // Stripe Link setup
                stripeBtn.href = stripeLink;
            } else {
                orderBtn.classList.add('disabled');
                stripeBtn.classList.add('disabled');
                orderBtn.href = "#";
                stripeBtn.href = "#";
            }
        }

        updatePrice();
    </script>

</body>
</html>
