<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webkitten | Order</title>
    <style>
        :root {
            --primary-orange: #ff6700;
            --dark-orange: #e65c00;
            --soft-orange: #fff3e6;
            --white: #ffffff;
            --text: #2d2d2d;
            --gray: #94a3b8;
            --success: #22c55e;
            --stripe-purple: #635bff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--soft-orange);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            background-color: var(--white);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 103, 0, 0.1);
            max-width: 450px;
            width: 100%;
            border-top: 10px solid var(--primary-orange);
        }

        h1 { color: var(--primary-orange); font-size: 2.8rem; margin: 0 0 10px 0; font-weight: 900; }
        .subtitle { font-size: 1.1rem; margin-bottom: 25px; color: #555; }

        .input-group {
            background: #fffbf5;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #ffe0b2;
            margin-bottom: 20px;
            text-align: left;
        }

        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.85rem; text-transform: uppercase; color: var(--dark-orange); }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--primary-orange);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        textarea { height: 100px; resize: none; margin-bottom: 0; }
        input[type="number"] { width: 80px; text-align: center; font-weight: bold; }

        .total-price {
            display: block;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--dark-orange);
            text-align: center;
            margin: 10px 0;
        }

        .btn {
            width: 100%;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        /* Stripe Button */
        .btn-pay {
            background-color: var(--stripe-purple);
            color: white;
            box-shadow: 0 8px 20px rgba(99, 91, 255, 0.2);
        }

        .btn-pay:disabled { background-color: var(--gray); opacity: 0.6; cursor: not-allowed; }

        /* Loading & Success views */
        #processingView, #successView { display: none; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-orange); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .success-icon { color: var(--success); font-size: 4rem; }
    </style>
</head>
<body>

    <div class="container">
        <div id="orderView">
            <h1>Webkitten 🐾</h1>
            <p class="subtitle">Custom websites for <strong>€2 per page</strong>.</p>
            
            <div class="input-group">
                <label>1. Number of pages</label>
                <input type="number" id="pages" value="1" min="1" max="10" oninput="updatePrice()">

                <label>2. Your Email</label>
                <input type="email" id="email" placeholder="example@mail.com" oninput="updatePrice()">

                <label>3. Project Details</label>
                <textarea id="details" placeholder="What do you want me to build?" oninput="updatePrice()"></textarea>
                
                <div class="total-price" id="displayPrice">Total: €2</div>
            </div>

            <button id="payBtn" class="btn btn-pay" disabled onclick="redirectToStripe()">
                Pay & Order
            </button>
        </div>

        <div id="processingView">
            <div class="spinner"></div>
            <h2>Finalizing your order...</h2>
            <p>Don't close this page, we are sending your details to Sven!</p>
        </div>

        <div id="successView">
            <div class="success-icon">✓</div>
            <h2>Payment Successful!</h2>
            <p>I've received your details and payment. I will contact you soon!</p>
            <br>
            <a href="index.html" class="btn btn-pay" style="background: var(--primary-orange);">Back to Home</a>
        </div>
    </div>

    <script>
        const STRIPE_LINK = "HIER_JOUW_STRIPE_LINK"; // PLAK HIER JE LINK!

        function updatePrice() {
            const pages = document.getElementById('pages');
            const email = document.getElementById('email').value;
            const details = document.getElementById('details').value;
            const payBtn = document.getElementById('payBtn');
            const display = document.getElementById('displayPrice');

            if (pages.value > 10) pages.value = 10;
            const total = pages.value * 2;
            display.innerText = "Total: €" + total;

            const isValid = email.includes('@') && details.trim().length > 5 && pages.value > 0;
            payBtn.disabled = !isValid;
        }

        function redirectToStripe() {
            // Sla gegevens op in de browser van de klant
            const orderData = {
                pages: document.getElementById('pages').value,
                email: document.getElementById('email').value,
                details: document.getElementById('details').value
            };
            localStorage.setItem('pendingOrder', JSON.stringify(orderData));

            // Stuur door naar Stripe
            window.location.href = STRIPE_LINK;
        }

        async function checkStatus() {
            const urlParams = new URLSearchParams(window.location.search);
            
            if (urlParams.get('status') === 'success') {
                // Toon de "verwerken" status
                document.getElementById('orderView').style.display = 'none';
                document.getElementById('processingView').style.display = 'block';

                const savedData = JSON.parse(localStorage.getItem('pendingOrder'));

                if (savedData) {
                    const formData = new FormData();
                    formData.append('Email', savedData.email);
                    formData.append('Pages', savedData.pages);
                    formData.append('Details', savedData.details);
                    formData.append('Payment', 'VERIFIED VIA STRIPE');

                    // Stuur dán pas naar Formspree
                    try {
                        await fetch("https://formspree.io/f/xlgobekj", {
                            method: "POST",
                            body: formData,
                            headers: { 'Accept': 'application/json' }
                        });
                        
                        // Klaar! Toon succes scherm
                        localStorage.removeItem('pendingOrder');
                        document.getElementById('processingView').style.display = 'none';
                        document.getElementById('successView').style.display = 'block';
                    } catch (e) {
                        alert("Details couldn't be sent, but payment was okay. Please email Sven!");
                    }
                }
            }
        }

        // Check bij het laden of we net van Stripe komen
        window.onload = checkStatus;
    </script>

</body>
</html>
