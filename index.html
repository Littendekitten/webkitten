<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webkitten | Order</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary-orange: #ff6700;
            --dark-orange: #e65c00;
            --soft-orange: #fff3e6;
            --white: #ffffff;
            --text: #2d2d2d;
            --gray: #94a3b8;
            --success-green: #31b057;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--soft-orange);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            background-color: var(--white);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 103, 0, 0.1);
            max-width: 450px;
            width: 100%;
            border-top: 10px solid var(--primary-orange);
        }

        h1 { color: var(--primary-orange); font-size: 2.8rem; margin: 0 0 10px 0; font-weight: 900; }
        .subtitle { font-size: 1.1rem; margin-bottom: 25px; color: #555; }

        .input-group {
            background: #fffbf5;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #ffe0b2;
            margin-bottom: 20px;
            text-align: left;
        }

        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.85rem; text-transform: uppercase; color: var(--dark-orange); }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--primary-orange);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        textarea { height: 100px; resize: none; margin-bottom: 0; }
        input[type="number"] { width: 80px; text-align: center; font-weight: bold; }

        .total-price {
            display: block;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--dark-orange);
            text-align: center;
            margin: 10px 0;
        }

        .btn {
            width: 100%;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-submit { background-color: var(--primary-orange); color: white; box-shadow: 0 8px 20px rgba(255, 103, 0, 0.2); }
        .btn-submit:disabled { background-color: var(--gray); opacity: 0.6; cursor: not-allowed; }

        #paymentView { display: none; }
        .btn-tikkie { background-color: var(--success-green); color: white; margin-top: 15px; box-shadow: 0 8px 20px rgba(49, 176, 87, 0.2); }
        
        .footer { margin-top: 30px; font-size: 0.8rem; color: #aaa; }
    </style>
</head>
<body>

    <div class="container">
        <div id="orderView">
            <h1>Webkitten 🐾</h1>
            <p class="subtitle">Custom websites for <strong>€2 per page</strong>.</p>
            
            <div class="input-group">
                <label>1. Number of pages (Max 10)</label>
                <input type="number" id="pages" value="1" min="1" max="10" oninput="updatePrice()">

                <label>2. Your Email</label>
                <input type="email" id="email" placeholder="your@email.com" oninput="updatePrice()">

                <label>3. Project Details</label>
                <textarea id="details" placeholder="Tell me about your project..."></textarea>
                
                <div class="total-price" id="displayPrice">Total: €2</div>
            </div>

            <button id="submitBtn" class="btn btn-submit" disabled onclick="sendData()">
                Submit Details
            </button>
        </div>

        <div id="paymentView">
            <h2 style="color: #22c55e;">Details Received! ✓</h2>
            <p>To start the project, please pay <strong><span id="finalPrice">€2</span></strong> via Tikkie.</p>
            
            <a href="#" id="tikkieLink" target="_blank" class="btn btn-tikkie">Pay via Tikkie</a>
            
            <p id="expiryWarning" style="color: #d93025; display: none; font-size: 0.8rem; margin-top: 15px; font-weight: bold;">
                ⚠️ This link might be expired. Sven has been notified to update it!
            </p>
        </div>

        <div class="footer">
            &copy; 2026 Webkitten. Created by Sven.
        </div>
    </div>

    <script>
        // FILL IN YOUR REMAINING FIREBASE KEYS HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", 
            authDomain: "webkitten-buysite.firebaseapp.com",
            databaseURL: "https://webkitten-buysite-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "webkitten-buysite",
            storageBucket: "webkitten-buysite.appspot.com",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let tikkieData = { link: "", expiry: "" };

        // Real-time link listener
        db.ref('settings').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                tikkieData = data;
                document.getElementById('tikkieLink').href = data.link;
                
                // Check if expired
                const today = new Date().toISOString().split('T')[0];
                if (today > data.expiry) {
                    document.getElementById('expiryWarning').style.display = 'block';
                    notifyAdminOfExpiry(data.link);
                }
            }
        });

        function updatePrice() {
            const pages = document.getElementById('pages');
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submitBtn');
            const display = document.getElementById('displayPrice');

            if (pages.value > 10) pages.value = 10;
            const total = pages.value * 2;
            display.innerText = "Total: €" + (pages.value ? total : 0);
            btn.disabled = !(email.includes('@') && pages.value > 0);
        }

        async function sendData() {
            const submitBtn = document.getElementById('submitBtn');
            const pages = document.getElementById('pages').value;
            const email = document.getElementById('email').value;
            const details = document.getElementById('details').value;

            submitBtn.innerText = "Sending...";
            submitBtn.disabled = true;

            const formData = new FormData();
            formData.append('Email', email);
            formData.append('Pages', pages);
            formData.append('Details', details);
            formData.append('Total', '€' + (pages * 2));

            await fetch("https://formspree.io/f/xlgobekj", {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            });

            document.getElementById('orderView').style.display = 'none';
            document.getElementById('paymentView').style.display = 'block';
            document.getElementById('finalPrice').innerText = "€" + (pages * 2);
        }

        function notifyAdminOfExpiry(oldLink) {
            if (!sessionStorage.getItem('expiry_notified')) {
                fetch("https://formspree.io/f/xlgobekj", {
                    method: "POST",
                    body: JSON.stringify({ 
                        ALERT: "Action Required!", 
                        Message: "Your Tikkie link is outdated. Please update it in the Admin Panel.",
                        OldLink: oldLink 
                    }),
                    headers: { 'Content-Type': 'application/json' }
                });
                sessionStorage.setItem('expiry_notified', 'true');
            }
        }
    </script>
</body>
</html>
