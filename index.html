<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webkitten | €1 per page</title>
    <style>
        :root {
            --primary-orange: #ff6700;
            --dark-orange: #e65c00;
            --light-orange: #fff3e6;
            --white: #ffffff;
            --text-dark: #2d2d2d;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light-orange);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            background-color: var(--white);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 103, 0, 0.15);
            max-width: 500px;
            width: 95%;
            border-top: 8px solid var(--primary-orange);
        }

        h1 {
            color: var(--primary-orange);
            font-size: 2.8rem;
            margin: 0 0 10px 0;
        }

        p {
            line-height: 1.6;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }

        .calculator {
            background: #fdf2e9;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid #ffe0b2;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 1.2rem;
        }

        input[type="number"] {
            width: 90px;
            padding: 12px;
            font-size: 1.3rem;
            border: 3px solid var(--primary-orange);
            border-radius: 12px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--dark-orange);
        }

        .price-display {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--dark-orange);
            margin-top: 20px;
            display: block;
        }

        .cta-button {
            background-color: var(--primary-orange);
            color: var(--white);
            text-decoration: none;
            padding: 18px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 6px 15px rgba(255, 103, 0, 0.3);
            width: 80%;
        }

        .cta-button:hover {
            background-color: var(--dark-orange);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 103, 0, 0.4);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #888;
        }

        .paw { color: var(--primary-orange); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Webkitten <span class="paw">🐾</span></h1>
        <p>Simple, modern websites for only <strong>€1 per page</strong>.</p>
        
        <div class="calculator">
            <label for="pages">How many pages?</label>
            <input type="number" id="pages" value="1" min="1" oninput="calculatePrice()">
            
            <span class="price-display" id="totalPrice">Total: €1</span>
        </div>

        <a href="#" id="mailButton" class="cta-button">
            Request My Website
        </a>
    </div>

    <div class="footer">
        &copy; 2026 Webkitten. All rights reserved.
    </div>

    <script>
        function calculatePrice() {
            const pagesInput = document.getElementById('pages');
            const priceDisplay = document.getElementById('totalPrice');
            const mailButton = document.getElementById('mailButton');
            
            let pages = pagesInput.value;
            
            // Zorg dat het minimaal 1 blijft
            if (pages < 1 && pages !== "") {
                pages = 1;
                pagesInput.value = 1;
            }
            
            // Prijs is nu 1 euro per pagina
            const total = pages * 1;
            
            // Update de prijs op het scherm
            priceDisplay.innerText = "Total: €" + (pages === "" ? "0" : total);
            
            // Update de e-mail link
            const email = "littendekitten@gmail.com";
            const subject = encodeURIComponent("Webkitten Order: " + pages + " page(s)");
            const body = encodeURIComponent(
                "Hi Webkitten!\n\n" +
                "I would like to order a website with " + pages + " page(s).\n" +
                "Total price: €" + total + ".\n\n" +
                "My ideas for the site:\n[Write your ideas here]"
            );
            
            mailButton.href = "mailto:" + email + "?subject=" + subject + "&body=" + body;
        }

        // Activeer direct bij het laden
        calculatePrice();
    </script>

</body>
</html>
