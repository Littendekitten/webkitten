<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webkitten | Order</title>
    <style>
        :root {
            --primary-orange: #ff6700;
            --dark-orange: #e65c00;
            --soft-orange: #fff3e6;
            --white: #ffffff;
            --text: #2d2d2d;
            --gray: #94a3b8;
            --success: #22c55e;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--soft-orange);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            background-color: var(--white);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 103, 0, 0.1);
            max-width: 450px;
            width: 100%;
            border-top: 10px solid var(--primary-orange);
        }

        h1 { color: var(--primary-orange); font-size: 2.8rem; margin: 0 0 10px 0; font-weight: 900; }
        .subtitle { font-size: 1.1rem; margin-bottom: 25px; color: #555; }

        /* Form styling */
        #orderForm { text-align: left; }
        .input-group {
            background: #fffbf5;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #ffe0b2;
            margin-bottom: 20px;
        }

        label { display: block; font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; text-transform: uppercase; color: var(--dark-orange); }
        
        input[type="number"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--primary-orange);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        input[type="number"] { width: 80px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        textarea { height: 100px; resize: none; }

        .total-price {
            display: block;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--dark-orange);
            text-align: center;
            margin: 15px 0;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-submit {
            background-color: var(--primary-orange);
            color: white;
            box-shadow: 0 8px 20px rgba(255, 103, 0, 0.2);
        }

        .btn-submit:disabled { background-color: var(--gray); opacity: 0.6; cursor: not-allowed; }

        /* Stripe Section (Hidden by default) */
        #paymentSection { display: none; }
        .btn-stripe {
            background-color: #635bff;
            color: white;
            box-shadow: 0 8px 20px rgba(99, 91, 255, 0.3);
        }

        .success-icon { color: var(--success); font-size: 4rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="formSection">
            <h1>Webkitten 🐾</h1>
            <p class="subtitle">Custom websites for <strong>€2 per page</strong>.</p>
            
            <form id="orderForm">
                <div class="input-group">
                    <label>1. Pages (Max 10)</label>
                    <input type="number" id="pages" name="pages" value="1" min="1" max="10" 
                           onkeydown="return ['e', 'E', '+', '-', '.', ','].includes(event.key) ? false : true"
                           oninput="updatePrice()">

                    <label>2. Project Details</label>
                    <textarea id="details" name="details" placeholder="What should your site look like?" oninput="updatePrice()"></textarea>
                    
                    <div class="total-price" id="displayPrice">Total: €2</div>
                </div>

                <button type="button" id="submitBtn" class="btn btn-submit" disabled onclick="sendData()">
                    Submit Project
                </button>
            </form>
        </div>

        <div id="paymentSection">
            <div class="success-icon">✓</div>
            <h2>Details Received!</h2>
            <p>To start the project, please complete the payment below.</p>
            <div class="total-price" id="finalPrice">€2</div>
            <a href="HIER_JOUW_STRIPE_LINK" id="stripeLink" class="btn btn-stripe">Pay with Stripe</a>
            <p style="font-size: 0.8rem; margin-top: 15px; color: #777;">Make sure to set the quantity to the correct number of pages on the Stripe page.</p>
        </div>
    </div>

    <script>
        function updatePrice() {
            const pages = document.getElementById('pages');
            const details = document.getElementById('details');
            const submitBtn = document.getElementById('submitBtn');
            const display = document.getElementById('displayPrice');
            
            if (pages.value > 10) pages.value = 10;
            if (pages.value < 1 && pages.value !== "") pages.value = 1;

            const total = pages.value * 2;
            display.innerText = "Total: €" + (pages.value === "" ? "0" : total);

            // Activeer knop als details zijn ingevuld
            submitBtn.disabled = details.value.trim().length < 5;
        }

        async function sendData() {
            const submitBtn = document.getElementById('submitBtn');
            const pages = document.getElementById('pages').value;
            const details = document.getElementById('details').value;

            submitBtn.innerText = "Sending...";
            submitBtn.disabled = true;

            // Formspree API call (Vervang de code hieronder met jouw Formspree ID)
            const formData = new FormData();
            formData.append('Pages', pages);
            formData.append('Details', details);
            formData.append('Total', '€' + (pages * 2));

            try {
                const response = await fetch("https://formspree.io/f/JOUW_FORMSPREE_ID", {
                    method: "POST",
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    // Wissel van sectie
                    document.getElementById('formSection').style.display = 'none';
                    document.getElementById('paymentSection').style.display = 'block';
                    document.getElementById('finalPrice').innerText = "Total: €" + (pages * 2);
                } else {
                    alert("Oops! Something went wrong. Please try again.");
                    submitBtn.innerText = "Submit Project";
                    submitBtn.disabled = false;
                }
            } catch (error) {
                alert("Error connecting to the server.");
                submitBtn.innerText = "Submit Project";
                submitBtn.disabled = false;
            }
        }
    </script>

</body>
</html>
